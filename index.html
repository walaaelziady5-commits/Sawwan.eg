<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صَوّان | توريد وتركيب الرخام</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family: Arial, sans-serif;

}

body{

    background:#f8f8f8;

    color:#333;

}

header{

    background:#1f1f1f;

    color:white;

    padding:20px 8%;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.logo{

    font-size:30px;

    font-weight:bold;

}

.hero{

    height:80vh;

    background:#333;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

}

.hero-content h1{

    font-size:50px;

    margin-bottom:15px;

}

.btn{

    background:#c9a86a;

    color:white;

    padding:12px 24px;

    text-decoration:none;

    border-radius:5px;

}

section{

    padding:60px 8%;

}

.card{

    background:white;

    padding:25px;

    margin:15px 0;

    border-radius:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.1);

}

footer{

    background:#1f1f1f;

    color:white;

    text-align:center;

    padding:20px;

}

</style>

</head>

<body>

<header>

    <div class="logo">صَوّان</div>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>صَوّان</h1>

        <p>توريد وتركيب الرخام والجرانيت بأعلى جودة</p>

        <a href="#" class="btn">اطلب عرض سعر</a>

    </div>

</section>

<section>

    <div class="card">

        <h2>توريد الرخام</h2>

        <p>أفضل أنواع الرخام المحلي والمستورد.</p>

    </div>

    <div class="card">

        <h2>تركيب احترافي</h2>

        <p>فريق متخصص لتنفيذ جميع المشاريع.</p>

    </div>

    <div class="card">

        <h2>تشطيبات فاخرة</h2>

        <p>مطابخ، أرضيات، سلالم وواجهات.</p>

    </div>

</section>

<footer>

    © صَوّان - جميع الحقوق محفوظة

</footer>

</body>

</html>
